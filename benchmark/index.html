<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Benchmark</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <main class="d-flex flex-column vh-100">
      <header class="d-flex flex-column gap-3 p-3">
        <div class="d-flex gap-3 align-items-center">
          <h2 class="text-nowrap m-0">Owl benchmark</h2>
          <form action="#" class="d-flex align-items-center gap-3">
            <a id="start" href="#autorun" target="_blank" class="btn btn-sm btn-warning" autofocus
              >Run</a
            >
            <div class="d-flex align-items-center gap-2">
              <label for="duration" class="form-label m-0">Duration</label>
              <input
                class="form-control w-50"
                type="text"
                name="duration"
                id="duration"
                value="10"
              />
            </div>
            <div class="d-flex align-items-center gap-2">
              <label for="dataSize" class="form-label m-0">Data size</label>
              <input class="form-control w-50" type="text" name="data" id="dataSize" value="10" />
            </div>
            <label for="mergeData" class="form-check-label text-nowrap d-flex gap-2" style="cursor: pointer">
              <input
                class="form-check-input"
                style="cursor: inherit"
                type="checkbox"
                id="mergeData"
                name="merge"
              />
              Merge data
            </label>
          </form>
        </div>
        <nav class="d-flex align-items-center gap-2">
          Render template:
          <div id="render-buttons" class="btn-group"></div>
        </nav>
      </header>
      <div id="fixture" class="h-100 overflow-auto"></div>
    </main>
    <script type="module" src="./setups/owl2_reactive.ts" defer></script>
    <script type="module" src="./setups/owl3_state.ts" defer></script>
    <script type="module" src="./setups/owl3_signal.ts" defer></script>
    <script type="module" src="./benchmarks/render.ts" defer></script>
    <script type="module" src="./benchmarks/click.ts" defer></script>
    <script type="module" src="./setup.ts" defer></script>
  </body>
</html>
